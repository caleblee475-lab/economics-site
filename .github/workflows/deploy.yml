name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        
      # 1. We manually force the server to install Node 22
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          
      # 2. We manually tell it to download your background packages
      - name: Install dependencies
        run: npm install
        
      # 3. We manually tell Astro to build the HTML
      - name: Build site
        run: npm run build
        
      # 4. We package the finished site folder (Astro outputs to a folder named 'dist')
      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4